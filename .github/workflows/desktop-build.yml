name: Desktop Build (Vero)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            archive_name: vero-windows.zip
          - os: ubuntu-latest
            platform: linux
            archive_name: vero-linux.zip
          - os: macos-latest
            platform: macos
            archive_name: vero-mac.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Download Neutralino binaries
        run: bun x neu update

      - name: Build application
        run: bun run build

      - name: Prepare Release Folder
        shell: bash
        run: |
          mkdir -p release
          
          # Copy everything from the build output
          if [ -d "dist/Vero" ]; then
            cp -r dist/Vero/* release/
          elif [ -d "dist/Monochrome" ]; then
            cp -r dist/Monochrome/* release/
          fi
          
          # Move into release folder to clean up binary names
          cd release
          if [ "${{ matrix.platform }}" == "windows" ]; then
            mv *.exe Vero.exe || true
          elif [ "${{ matrix.platform }}" == "linux" ]; then
            mv Vero-linux* Vero || mv *linux* Vero || true
            chmod +x Vero
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            mv Vero-mac* Vero || mv *mac* Vero || true
            chmod +x Vero
          fi

      - name: Zip Files (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path release/* -DestinationPath ${{ matrix.archive_name }} -Force

      - name: Zip Files (Linux/Mac)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          # Zip the contents of the release folder directly
          cd release
          zip -r ../${{ matrix.archive_name }} .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}