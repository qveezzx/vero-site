name: Desktop Build (Vero)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            archive_name: vero-windows.zip
          - os: ubuntu-latest
            platform: linux
            archive_name: vero-linux.zip
          - os: macos-latest
            platform: macos
            archive_name: vero-mac.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Download Neutralino binaries
        run: bun x neu update

      - name: Build application
        run: bun run build

      - name: Prepare Release Folder
        shell: bash
        run: |
          mkdir -p release
          
          # 1. Find where the Neutralino resources.neu file ended up
          # It might be in dist/ or dist/Vero/
          NEU_PATH=$(find dist -name "resources.neu" | head -n 1)
          NEU_DIR=$(dirname "$NEU_PATH")
          
          echo "Found Neutralino resources at: $NEU_DIR"
          
          # 2. Copy EVERYTHING from that directory into our release folder
          cp -r "$NEU_DIR"/* release/
          
          # 3. If extensions exist in the root dist, copy those too
          if [ -d "dist/Vero/extensions" ]; then
            cp -r dist/Vero/extensions release/
          fi

          # 4. Clean up names
          cd release
          if [ "${{ matrix.platform }}" == "windows" ]; then
            # Find any .exe (ignoring case) and rename it to Vero.exe
            find . -maxdepth 1 -iname "*.exe" -exec mv {} Vero.exe \;
            # Ensure WebView2Loader.dll is in the right spot
          elif [ "${{ matrix.platform }}" == "linux" ]; then
            # Find the binary (usually has no extension)
            find . -maxdepth 1 -type f ! -name "*.*" -exec mv {} Vero \;
            chmod +x Vero
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            find . -maxdepth 1 -type f ! -name "*.*" -exec mv {} Vero \;
            chmod +x Vero
          fi

      - name: Zip Files (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path release/* -DestinationPath ${{ matrix.archive_name }} -Force

      - name: Zip Files (Linux/Mac)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          # Zip the contents of the release folder directly
          cd release
          zip -r ../${{ matrix.archive_name }} .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}