name: Desktop Build (Vero)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Download Neutralino binaries and client
        run: bun x neu update

      - name: Build web assets for Neutralino
        run: bun run build:web:desktop

      - name: Package Neutralino app (resources.neu + all platform binaries + extensions)
        run: bun x neu build

      - name: Create platform ZIPs
        shell: bash
        run: |
          set -euo pipefail
          PKG="dist/Vero"
          if [ ! -d "$PKG" ]; then
            echo "Missing $PKG after neu build"
            exit 1
          fi
          if [ ! -f "$PKG/resources.neu" ]; then
            echo "Missing resources.neu — neu build did not complete."
            ls -la "$PKG" || true
            exit 1
          fi

          mkdir -p release-artifacts
          cd "$PKG"

          chmod +x Vero-linux_x64 2>/dev/null || true
          for m in Vero-mac_universal Vero-mac_arm64 Vero-mac_x64; do
            if [ -f "$m" ]; then chmod +x "$m"; fi
          done

          WIN_EXE=$(compgen -G 'Vero-win*.exe' | head -n 1 || true)
          if [ -z "${WIN_EXE:-}" ]; then
            echo "No Windows executable (Vero-win*.exe) in $PKG"
            ls -la
            exit 1
          fi

          LIN_BIN=$(compgen -G 'Vero-linux_*' | head -n 1 || true)
          if [ -z "${LIN_BIN:-}" ]; then
            echo "No Linux binary (Vero-linux_*) in $PKG"
            ls -la
            exit 1
          fi

          MAC_BIN=""
          for candidate in Vero-mac_universal Vero-mac_arm64 Vero-mac_x64; do
            if [ -f "$candidate" ]; then MAC_BIN="$candidate"; break; fi
          done
          if [ -z "${MAC_BIN:-}" ]; then
            echo "No macOS binary (Vero-mac_*) in $PKG"
            ls -la
            exit 1
          fi

          if [ ! -d extensions ] || [ -z "$(ls -A extensions 2>/dev/null)" ]; then
            echo "extensions/ missing or empty — check neutralino.config.json cli.extensionsPath"
            ls -la
            exit 1
          fi

          zip -r "$GITHUB_WORKSPACE/release-artifacts/vero-windows.zip" resources.neu extensions "$WIN_EXE"
          zip -r "$GITHUB_WORKSPACE/release-artifacts/vero-linux.zip" resources.neu extensions "$LIN_BIN"
          zip -r "$GITHUB_WORKSPACE/release-artifacts/vero-mac.zip" resources.neu extensions "$MAC_BIN"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/vero-windows.zip
            release-artifacts/vero-linux.zip
            release-artifacts/vero-mac.zip
          name: Vero Desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
