name: Desktop Build (Vero)

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag
  workflow_dispatch: # Allows manual start

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            binary_source: Vero-win_x64.exe
            archive_name: vero-windows.zip
          - os: ubuntu-latest
            platform: linux
            binary_source: Vero-linux_x64
            archive_name: vero-linux.zip
          - os: macos-latest
            platform: macos
            binary_source: Vero-mac_universal
            archive_name: vero-mac.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Download Neutralino binaries
        run: bun x neu update

      - name: Build application
        run: bun run build

      - name: Prepare Release Folder
        shell: bash
        run: |
          mkdir -p release
          cp -r dist/Vero/* release/ || cp -r dist/Monochrome/* release/
          
      - name: Zip Files
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path release/* -DestinationPath ${{ matrix.archive_name }} -Force

      - name: Zip Files (Linux/Mac)
        if: matrix.platform != 'windows'
        shell: bash
        run: zip -r ${{ matrix.archive_name }} release/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}